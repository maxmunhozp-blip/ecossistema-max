name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vps:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Sync arquivos HTML e assets para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "*.html,criativos/,CLAUDE.md"
          target: /opt/ecosistema-max/
          rm: false

      - name: Atualiza skills no VPS via GitHub
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            git config --global --add safe.directory /opt/ecosistema-max
            cd /opt/ecosistema-max
            git init
            git remote remove origin 2>/dev/null || true
            git remote add origin https://github.com/maxmunhozp-blip/ecossistema-max.git
            git fetch origin main
            git checkout -f origin/main -- skills/
            # Sincroniza SKILL.md de cada skill para /opt/skill-data/ (usado pela API)
            mkdir -p /opt/skill-data
            for dir in /opt/ecosistema-max/skills/skill-*/; do
              id=$(basename "$dir")
              [ -f "$dir/SKILL.md" ] && cp "$dir/SKILL.md" "/opt/skill-data/${id}.md"
            done

  deploy-hostinger:
    name: Deploy → Hostinger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload via FTP (tracktor.com.br/ecossistema)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: ecossistema/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**

      - name: Upload via FTP (ecossistema.tracktor.com.br)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: domains/tracktor.com.br/public_html/ecossistema/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**

  notify-telegram:
    name: Notifica Telegram
    runs-on: ubuntu-latest
    needs: [deploy-vps, deploy-hostinger]
    if: always()
    steps:
      - name: Envia status do deploy
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VPS="${{ needs.deploy-vps.result }}"
          HST="${{ needs.deploy-hostinger.result }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          if [ "$HST" = "success" ]; then
            VPS_ICON="$([ "$VPS" = "success" ] && echo "✅" || echo "⚠️")"
            TEXT="${VPS_ICON} VPS | ✅ Hostinger — ${COMMIT_MSG}"
          else
            TEXT="❌ Deploy falhou — ${COMMIT_MSG}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${TEXT}\"}"
