name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vps:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "*.html,skills/,criativos/,CLAUDE.md"
          target: /opt/ecosistema-max/
          rm: false

  deploy-hostinger:
    name: Deploy → Hostinger
    runs-on: ubuntu-latest
    needs: deploy-vps
    steps:
      - name: Trigger Hostinger deploy
        run: |
          if [ -n "${{ secrets.HOSTINGER_WEBHOOK }}" ]; then
            curl -s -X POST "${{ secrets.HOSTINGER_WEBHOOK }}" || true
          fi
