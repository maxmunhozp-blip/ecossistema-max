name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vps:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepara estrutura de skills (só SKILL.md)
        run: |
          mkdir -p skills-flat
          for dir in skills/*/; do
            id=$(basename "$dir")
            if [ -f "$dir/SKILL.md" ]; then
              mkdir -p "skills-flat/$id"
              cp "$dir/SKILL.md" "skills-flat/$id/SKILL.md"
            fi
          done

      - name: Sync para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "*.html,skills-flat/,criativos/,CLAUDE.md"
          target: /opt/ecosistema-max/
          rm: false

      - name: Renomeia pasta skills-flat → skills no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            if [ -d /opt/ecosistema-max/skills-flat ]; then
              rsync -a /opt/ecosistema-max/skills-flat/ /opt/ecosistema-max/skills/
              rm -rf /opt/ecosistema-max/skills-flat
            fi

  deploy-hostinger:
    name: Deploy → Hostinger
    runs-on: ubuntu-latest
    needs: deploy-vps
    steps:
      - uses: actions/checkout@v4

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: ecossistema/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
