name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vps:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Sync completo para VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "*.html,clientes/,criativos/,scripts/,CLAUDE.md"
          target: /opt/ecosistema-max/
          rm: false

      - name: Deploy Esmeralda API
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "esmeralda-api/"
          target: /opt/
          rm: false

      - name: Install deps + restart Esmeralda API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/esmeralda-api
            npm install --production
            export ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            npx pm2 delete esmeralda-api 2>/dev/null || true
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" npx pm2 start ecosystem.config.cjs
            npx pm2 save
            # Traefik route for esmeralda-api subdomain
            mkdir -p /opt/traefik/config
            cat > /opt/traefik/config/esmeralda-api.yml << 'TRAEFIKEOF'
            http:
              routers:
                esmeralda-api:
                  rule: "Host(`esmeralda-api.tracktor.com.br`)"
                  entryPoints:
                    - websecure
                  tls:
                    certResolver: letsencrypt
                  service: esmeralda-api
              services:
                esmeralda-api:
                  loadBalancer:
                    servers:
                      - url: "http://host.docker.internal:4100"
            TRAEFIKEOF

      - name: Atualiza skills no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            git config --global --add safe.directory /opt/ecosistema-max-repo
            cd /opt/ecosistema-max-repo 2>/dev/null || exit 0
            git fetch origin main
            git checkout -f origin/main -- skills/
            mkdir -p /opt/skill-data
            for dir in /opt/ecosistema-max-repo/skills/skill-*/; do
              id=$(basename "$dir")
              [ -f "$dir/SKILL.md" ] && cp "$dir/SKILL.md" "/opt/skill-data/${id}.md"
            done

  deploy-hostinger:
    name: Deploy → Hostinger
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Upload via FTP (tracktor.com.br/ecossistema)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: ecossistema/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**

      - name: Upload via FTP (ecossistema.tracktor.com.br)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: domains/tracktor.com.br/public_html/ecossistema/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**

  deploy-esmeralda:
    name: Deploy Esmeralda → Hostinger
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Upload Esmeralda frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./esmeralda/
          server-dir: esmeralda/

  notify-telegram:
    name: Notifica Telegram
    runs-on: ubuntu-latest
    needs: [deploy-vps, deploy-hostinger, deploy-esmeralda]
    if: always()
    steps:
      - name: Envia status do deploy
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VPS="${{ needs.deploy-vps.result }}"
          HST="${{ needs.deploy-hostinger.result }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          VPS_ICON="$([ "$VPS" = "success" ] && echo "✅" || echo "❌")"
          HST_ICON="$([ "$HST" = "success" ] && echo "✅" || echo "⚠️")"
          TEXT="${VPS_ICON} VPS | ${HST_ICON} Hostinger — ${COMMIT_MSG}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${TEXT}\"}"
