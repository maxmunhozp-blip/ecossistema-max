name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vps:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync arquivos HTML e assets para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "*.html,criativos/,CLAUDE.md"
          target: /opt/ecosistema-max/
          rm: false

      - name: Atualiza skills no VPS via GitHub
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            git config --global --add safe.directory /opt/ecosistema-max
            cd /opt/ecosistema-max
            git init
            git remote remove origin 2>/dev/null || true
            git remote add origin https://github.com/maxmunhozp-blip/ecossistema-max.git
            git fetch origin main
            git checkout -f origin/main -- skills/
            # Garante skills com subpastas via download direto
            REPO="https://raw.githubusercontent.com/maxmunhozp-blip/ecossistema-max/main"
            SKILLS_API="https://api.github.com/repos/maxmunhozp-blip/ecossistema-max/contents/skills"
            curl -s "$SKILLS_API" | grep '"name"' | sed 's/.*"name": "\(.*\)".*/\1/' | while read skill; do
              mkdir -p "skills/$skill"
              url="$REPO/skills/$skill/SKILL.md"
              wget -q -O "skills/$skill/SKILL.md" "$url" 2>/dev/null || true
            done
            echo "Skills atualizadas: $(ls skills/ | wc -l)"

  deploy-hostinger:
    name: Deploy → Hostinger
    runs-on: ubuntu-latest
    needs: deploy-vps
    steps:
      - uses: actions/checkout@v4

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: ecossistema/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
