name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vps:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync arquivos HTML e assets para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "*.html,criativos/,CLAUDE.md"
          target: /opt/ecosistema-max/
          rm: false

      - name: Atualiza skills no VPS via GitHub
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            git config --global --add safe.directory /opt/ecosistema-max
            cd /opt/ecosistema-max
            git init
            git remote remove origin 2>/dev/null || true
            git remote add origin https://github.com/maxmunhozp-blip/ecossistema-max.git
            git fetch origin main
            git checkout -f origin/main -- skills/
            # Download direto do skill-pagina-vendas
            mkdir -p skills/skill-pagina-vendas
            wget -q -O skills/skill-pagina-vendas/SKILL.md \
              "https://raw.githubusercontent.com/maxmunhozp-blip/ecossistema-max/main/skills/skill-pagina-vendas/SKILL.md" \
              && echo "skill-pagina-vendas: OK" || echo "skill-pagina-vendas: FALHOU"
            ls -la skills/skill-pagina-vendas/ 2>/dev/null || echo "diretorio nao existe"
            echo "Skills total: $(ls skills/ | wc -l)"
            # Recarrega nginx para garantir novos arquivos
            docker restart $(docker ps --filter "name=nginx" --format "{{.Names}}" | head -1) 2>/dev/null || \
            docker restart $(docker ps --filter "expose=80" --format "{{.Names}}" | head -1) 2>/dev/null || \
            nginx -s reload 2>/dev/null || true
            echo "nginx recarregado"

  deploy-hostinger:
    name: Deploy → Hostinger
    runs-on: ubuntu-latest
    needs: deploy-vps
    steps:
      - uses: actions/checkout@v4

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: ecossistema/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
