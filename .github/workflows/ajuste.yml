name: Ajuste via Chat LL

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: 'Instrução para Claude Code'
        required: true
        type: string

jobs:
  executar-ajuste:
    name: Claude Code no VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Escreve instrução em arquivo
        run: |
          mkdir -p /tmp/ajuste
          printf '%s' "$INSTRUCTION" > /tmp/ajuste/instruction.txt
          echo "Instrução (primeiros 120 chars):"
          head -c 120 /tmp/ajuste/instruction.txt
        env:
          INSTRUCTION: ${{ github.event.inputs.instruction }}

      - name: Copia instrução para o VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: /tmp/ajuste/instruction.txt
          target: /tmp/ajuste/
          strip_components: 3

      - name: Executa Claude Code no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 8m
          script: |
            echo "=== Instrução ==="
            cat /tmp/ajuste/instruction.txt
            echo ""

            cd /opt/ecosistema-max-repo
            git pull origin main --quiet || echo "git pull falhou, continuando..."

            echo "=== Executando Claude Code ==="
            /usr/bin/claude --print < /tmp/ajuste/instruction.txt
            EXIT_CODE=$?
            echo "=== Claude Code saiu com código: $EXIT_CODE ==="

            git add -A
            if git diff --staged --quiet; then
              echo "Sem mudanças para commitar."
            else
              git commit -m "ajuste(chat-ll): $(date '+%d/%m/%Y %H:%M')"
              git push origin main
              echo "Push feito com sucesso."
            fi

            rm -rf /tmp/ajuste

      - name: Notifica Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          INSTRUCTION: ${{ github.event.inputs.instruction }}
        run: |
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          INSTR=$(printf '%s' "$INSTRUCTION" | head -c 80)
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${ICON} Ajuste via chat: ${INSTR}\"}" || true
