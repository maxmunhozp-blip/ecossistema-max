name: Ajuste via Chat LL

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: 'Instrução para Claude Code'
        required: true
        type: string

jobs:
  executar-ajuste:
    name: Claude Code no VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Executa Claude Code no VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          INSTRUCTION: ${{ github.event.inputs.instruction }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs: INSTRUCTION,ANTHROPIC_API_KEY
          command_timeout: 8m
          script: |
            export HOME=/root
            export ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY"
            cd /opt/ecossistema-max-repo
            git pull origin main --quiet || true

            echo "=== Instrução recebida ==="
            echo "$INSTRUCTION"
            echo "=========================="

            /usr/bin/claude -p "$INSTRUCTION" --dangerously-skip-permissions

            git add -A
            if git diff --staged --quiet; then
              echo "Sem mudanças para commitar."
            else
              git commit -m "ajuste(chat-ll): $(date '+%d/%m/%Y %H:%M')"
              git push origin main
              echo "Push feito."
            fi

      - name: Notifica Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          INSTRUCTION: ${{ github.event.inputs.instruction }}
        run: |
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          INSTR=$(printf '%s' "$INSTRUCTION" | head -c 80)
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${ICON} Ajuste via chat: ${INSTR}\"}" || true
