name: Ajuste via Chat LL

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: 'Instrução para Claude Code'
        required: true
        type: string

jobs:
  executar-ajuste:
    name: Claude Code no VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Executa Claude Code no VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          INSTRUCTION: ${{ github.event.inputs.instruction }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          host: 76.13.172.151
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs: INSTRUCTION,ANTHROPIC_API_KEY
          command_timeout: 8m
          script: |
            export HOME=/root
            cd /opt/ecossistema-max-repo

            # Garante que o repo está limpo e sincronizado com origin antes de qualquer alteração
            git fetch origin main --quiet
            git reset --hard origin/main --quiet

            echo "=== Instrução recebida ==="
            echo "$INSTRUCTION"
            echo "=========================="

            echo "=== Passo 1: Aplicando instrução ==="
            CLAUDE_OUT=$(/usr/bin/claude -p "$INSTRUCTION" --allowedTools "Edit,Write,Read,Bash,Glob,Grep" < /dev/null 2>&1)
            echo "$CLAUDE_OUT"
            if echo "$CLAUDE_OUT" | grep -qi "credit balance\|not logged in\|authentication\|unauthorized"; then
              echo "AUTH_FAILED=true" >> $GITHUB_ENV 2>/dev/null || export AUTH_FAILED=true
              echo "=== ERRO: Claude sem autenticação ==="
              exit 1
            fi

            echo "=== Passo 2: Design review automático ==="
            REVIEW_PROMPT=$(cat clientes/officina-app/DESIGN_REVIEW.md)
            /usr/bin/claude -p "$REVIEW_PROMPT" --allowedTools "Edit,Write,Read,Bash,Glob,Grep" < /dev/null

            git add -A
            if git diff --staged --quiet; then
              echo "Sem mudanças para commitar."
            else
              git commit -m "ajuste(chat-ll): $(date '+%d/%m/%Y %H:%M')"
              git push origin main
              echo "Push feito."
            fi

            # Sync repo → pasta de servir do nginx (garante deploy mesmo se FTP do Hostinger falhar)
            rsync -a --delete /opt/ecossistema-max-repo/clientes/ /opt/ecosistema-max/clientes/
            rsync -a --delete /opt/ecossistema-max-repo/assets/ /opt/ecosistema-max/assets/ 2>/dev/null || true
            echo "Sync VPS ok."

      - name: Notifica Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          INSTRUCTION: ${{ github.event.inputs.instruction }}
          AUTH_FAILED: ${{ env.AUTH_FAILED }}
        run: |
          INSTR=$(printf '%s' "$INSTRUCTION" | head -c 80)
          if [ "$STATUS" != "success" ] && [ "$AUTH_FAILED" = "true" ]; then
            MSG="🔑 Lucas perdeu o login — autentique agora:%0A1. ssh root@76.13.172.151%0A2. claude%0A3. Abra o link e logue no Claude.ai%0A%0APedido que falhou: ${INSTR}"
          else
            ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
            MSG="${ICON} Ajuste via chat: ${INSTR}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${MSG}\"}" || true
