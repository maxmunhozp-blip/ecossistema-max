<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esmeralda</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <!-- Sidebar (minimal) -->
  <aside class="sidebar">
    <div class="sidebar-logo">E</div>
    <nav class="sidebar-nav">
      <button class="sidebar-btn active" data-view="home" title="Home">
        <i data-lucide="message-circle"></i>
      </button>
      <button class="sidebar-btn" data-view="agencia" title="Agencia">
        <i data-lucide="users"></i>
      </button>
      <button class="sidebar-btn" data-view="foguetes" title="Foguetes">
        <i data-lucide="rocket"></i>
      </button>
      <button class="sidebar-btn" data-view="pendencias" title="Pendencias">
        <i data-lucide="clipboard-list"></i>
      </button>
    </nav>
  </aside>

  <!-- Main: Home (chat-first + focus) -->
  <main class="main">

    <!-- VIEW: Home (default) -->
    <div class="view active" id="view-home">

      <!-- Focus bar: one task at a time -->
      <div class="focus-bar" id="focus-bar">
        <div class="focus-bar-inner">
          <div class="focus-left">
            <span class="focus-label">Agora</span>
            <span class="focus-task" id="focus-task">Carregando...</span>
          </div>
          <div class="focus-right">
            <button class="focus-btn done" id="btn-done"><i data-lucide="check"></i> Feito</button>
            <button class="focus-btn skip" id="btn-skip">Pular</button>
          </div>
        </div>
        <div class="focus-progress">
          <div class="focus-progress-fill" id="focus-progress"></div>
        </div>
      </div>

      <!-- Chat (the main interface) -->
      <div class="chat-area">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-suggestions" id="chat-suggestions">
          <button class="suggestion" data-msg="onde eu parei?">onde eu parei?</button>
          <button class="suggestion" data-msg="organiza meu dia">organiza meu dia</button>
          <button class="suggestion" data-msg="to travado, me ajuda">to travado, me ajuda</button>
        </div>
        <form class="chat-input" id="chat-form">
          <input type="text" id="chat-text" placeholder="Fala o que ta na sua cabeca..." autocomplete="off">
          <button type="submit"><i data-lucide="send"></i></button>
        </form>
      </div>
    </div>

    <!-- VIEW: Agencia -->
    <div class="view" id="view-agencia">
      <div class="view-header">
        <button class="btn-back" onclick="goHome()"><i data-lucide="arrow-left" class="icon-sm"></i> Voltar</button>
        <h2>Agencia</h2>
      </div>
      <div class="agencia-summary" id="agencia-summary"></div>
      <div class="single-column" id="agencia-clients"></div>
    </div>

    <!-- VIEW: Foguetes -->
    <div class="view" id="view-foguetes">
      <div class="view-header">
        <button class="btn-back" onclick="goHome()"><i data-lucide="arrow-left" class="icon-sm"></i> Voltar</button>
        <h2>Foguetes</h2>
      </div>
      <div class="single-column" id="foguetes-list"></div>
    </div>

    <!-- VIEW: Pendencias -->
    <div class="view" id="view-pendencias">
      <div class="view-header">
        <button class="btn-back" onclick="goHome()"><i data-lucide="arrow-left" class="icon-sm"></i> Voltar</button>
        <h2>Pendencias de empresa</h2>
      </div>
      <div class="single-column">
        <section class="card card-wide">
          <div class="pendencias-grid" id="list-pendencias"></div>
        </section>
      </div>
    </div>

  </main>

  <!-- Modal: Add Task -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Nova tarefa</h3>
        <button class="modal-close" id="modal-close"><i data-lucide="x" class="icon-sm"></i></button>
      </div>
      <form id="modal-form">
        <div class="form-group">
          <label>Titulo</label>
          <input type="text" id="modal-task-title" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>Descricao (opcional)</label>
          <input type="text" id="modal-task-subtitle" autocomplete="off">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tipo</label>
            <select id="modal-task-type">
              <option value="hoje">Hoje</option>
              <option value="urgente">Urgente</option>
            </select>
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <select id="modal-task-category">
              <option value="geral">Geral</option>
              <option value="agencia">Agencia</option>
              <option value="foguete">Foguete</option>
              <option value="empresa">Empresa</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
